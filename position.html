<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <button class="btn">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </button>


    <style>
        .btn {
            position: fixed;
            top: 40px;
            right: 24px;
            z-index: 999;

            border: none;
            background: transparent;

            width: 40px;
            height: 40px;
            background: #f9f9f9;
        }



        .btn span:nth-child(1) {
            height: 2px;
            position: absolute;
            background: #000;
            left: 4px;
            right: 4px;
        }

        .btn span:nth-child(2) {
            height: 2px;
            position: absolute;
            background: #000;
            left: 19px;
            right: 4px;
        }

        .btn span:nth-child(3) {
            height: 2px;
            position: absolute;
            background: #000;
            left: 4px;
            right: 4px;
        }

        .btn span:nth-child(4) {
            height: 2px;
            position: absolute;
            background: #000;
            left: 4px;
            right: 4px;
        }
    </style>

</body>

</html>
