<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도마뱀 소개</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/font.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <header class="header">
        <div class="inner">
            <h1>
                <img src="./images/도마뱀로고.jpg" alt="도마뱀 로고" class="logo">
            </h1>
            <nav>
                <ul>
                    <li><a href="#">도마뱀 정보</a></li>
                    <li><a href="#">갤러리</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>

        <section class="top-image">
            <div class="caption">
                <h2>사막 도마뱀</h2>
                <p>건조한 환경에서도 강하게 살아가는 도마뱀</p>
            </div>
        </section>

        <section class="bottom-images">
            <div class="inner">
                <div class="card">
                    <img src="./images/도마뱀.jpg" alt="녹색 도마뱀">
                    <p>녹색 도마뱀 – 숲 속에서 보호색 활용</p>
                </div>
                <div class="card">
                    <img src="./images/도마뱀2.jpg" alt="붉은 도마뱀">
                    <p>붉은 도마뱀 – 햇빛을 좋아하는 활발한 도마뱀</p>
                </div>
                <div class="card">
                    <img src="./images/도마뱀3.jpg" alt="야행성 도마뱀">
                    <p>야행성 도마뱀 – 밤에 활동하고 낮에는 휴식</p>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer">
        <p>© 2026 도마뱀 웹</p>
    </footer>

</body>

</html>
